server {
    listen 443 ssl;
    server_name budget.tailnet.ts.net;

    # SSL 证书 (Tailscale MagicDNS 自带 TLS，也可手动指定)
    ssl_certificate /etc/nginx/ssl/budget.crt;
    ssl_certificate_key /etc/nginx/ssl/budget.key;

    # 前端静态文件
    location / {
        root /opt/budget-management/web;
        try_files $uri $uri/ /index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 1000;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:6060;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 上传文件
    location /uploads/ {
        alias /opt/budget-management/uploads/;
        client_max_body_size 5m;
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name budget.tailnet.ts.net;
    return 301 https://$host$request_uri;
}
